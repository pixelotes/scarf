key: torrenttip
name: Torrenttip
rate_limit: 2s
description: "Torrenttip (토렌트팁) is a Public KOREAN tracker for Korean media."
type: public
enabled: "false"
language: ko-KR
schedule: '@hourly'
settings:
  - name: use_flaresolverr
    type: checkbox
    label: Use FlareSolverr
    default: 'false'
search:
  type: html
  urls:
    # Domain rotates (torrenttipNNN.top); list a few known-good as fallbacks.
    # The bare {{if.Query}} (no space) of the previous version was a syntax
    # error, .Today.Year doesn't exist in scarf either — both fixed below.
    - "https://torrenttip226.top/search?q={{if .Query}}{{.Query}}{{else}}2026{{end}}&sort=time"
    - "https://torrenttip227.top/search?q={{if .Query}}{{.Query}}{{else}}2026{{end}}&sort=time"
  params: {}
  results:
    # Site rewrote in Tailwind. Old ul.page-list is gone; each result is
    # a flex-row div containing one anchor with title= and href to /t/X.html
    rows_selector: 'div.flex-row:has(a[href$=".html"][title])'
    # Detail page has the magnet — two-step download.
    download_selector: 'a[href^="magnet:?xt="]@href'
    fields:
      title:
        selector: 'a[href$=".html"][title]@title'
      details_url:
        selector: 'a[href$=".html"][title]@href'
      # Listing doesn't expose swarm stats — hardcode so downstream filters
      # don't drop these results.
      seeders:
        text: "1"
      leechers:
        text: "0"
  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]
    music-search: [q]
    book-search: [q]
category_mappings:
  - indexer_cat: "한국영화"
    torznab_cat: 2000
  - indexer_cat: "해외영화"
    torznab_cat: 2010
  - indexer_cat: "해외드라마"
    torznab_cat: 5000
  - indexer_cat: "한국드라마"
    torznab_cat: 5000
  - indexer_cat: "넷플릭스 영화"
    torznab_cat: 2000
  - indexer_cat: "넷플릭스 시리즈"
    torznab_cat: 5000
  - indexer_cat: "예능·오락"
    torznab_cat: 3020
  - indexer_cat: "다큐·교양"
    torznab_cat: 5070
