key: tokyotosho
name: Tokyo Toshokan
description: Tokyo Toshokan is a Public BitTorrent Library for JAPANESE Media
type: public
enabled: "false"
language: en-US
schedule: '@hourly'
health_check:
  query: "frieren"
settings:
  - name: cat
    type: select
    label: Category
    default: '0'
    options:
      0: All
      1: Anime
      10: Non-English
      3: Manga
      8: Drama
      2: Music
      9: Music Video
      7: Raws
      4: Hentai
      12: Hentai (Anime)
      13: Hentai (Manga)
      14: Hentai (Games)
      11: Batch
      15: JAV
      5: Other
  - name: use_flaresolverr
    type: checkbox
    label: Use FlareSolverr
    default: 'false'
search:
  type: html
  urls:
    - "https://www.tokyotosho.info/{{if .Query}}search.php{{else}}index.php{{end}}"
  params:
    terms: "{{.Query}}"
    cat: "{{.Config.cat}}"
  results:
    # Each result spans TWO <tr>s (desc-top + desc-bot). goquery's Find can't
    # navigate to sibling rows, so size/seeders/leechers are unreachable.
    # Hardcoded below so downstream filters don't drop these results.
    rows_selector: "table.listing tr.category_0:has(td.desc-top)"
    fields:
      title:
        selector: td.desc-top a[type="application/x-bittorrent"]
      details_url:
        selector: a[href^="details.php?id="]@href
      download_url:
        selector: td.desc-top a[type="application/x-bittorrent"]@href
      seeders:
        text: "1"
      leechers:
        text: "0"
  modes:
    search:
      - q
    tv-search:
      - q
      - season
      - ep
    music-search:
      - q
    book-search:
      - q
category_mappings:
  - indexer_cat: '1'
    torznab_cat: 5080
  - indexer_cat: '10'
    torznab_cat: 5080
  - indexer_cat: '3'
    torznab_cat: 7000
  - indexer_cat: '8'
    torznab_cat: 5080
  - indexer_cat: '2'
    torznab_cat: 3000
  - indexer_cat: '9'
    torznab_cat: 5080
  - indexer_cat: '7'
    torznab_cat: 5080
  - indexer_cat: '4'
    torznab_cat: 6000
  - indexer_cat: '12'
    torznab_cat: 6000
  - indexer_cat: '13'
    torznab_cat: 6000
  - indexer_cat: '14'
    torznab_cat: 6000
  - indexer_cat: '11'
    torznab_cat: 5080
  - indexer_cat: '15'
    torznab_cat: 6000
  - indexer_cat: '5'
    torznab_cat: 8000
