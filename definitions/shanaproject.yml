key: "shanaproject"
name: "Shana Project"
rate_limit: 2s
description: "Shana Project is a Public torrent site for ANIME"
type: "public"
enabled: "false"
language: "en-US"
schedule: "@hourly"
health_check:
  query: "frieren"
settings:
  - name: use_flaresolverr
    type: checkbox
    label: Use FlareSolverr
    default: 'false'
search:
  type: "html"
  urls:
    - "https://www.shanaproject.com/search/"
  params:
    title: "{{.Query}}"
    subber: ""
    sort: "date"
    dir: "Descending"
  results:
    # Each result is a .release_block div with id="rel{N}"; the expanded
    # detail (full title, date) lives in a sibling div id="rel{N}x" that
    # HTML5 parsers nest into the same .release_block.
    # Tighten with .release_block to avoid iterating *btn and *x divs (152→50).
    rows_selector: "div.grid_12 > div[id^='rel'].release_block"
    fields:
      title:
        selector: "div.release_leftover > div.release_text_contents"
      download_url:
        selector: "a[href^='/download/']@href"
      size:
        selector: "div.release_size"
      # First .release_20 is "Quality: 1080p"; the date is the last one
      # (class adds .release_last).
      publish_date:
        selector: "div.release_20.release_last"
      # ShanaProject doesn't expose swarm stats. Hardcode so downstream
      # min-seeder filters don't drop these results.
      seeders:
        text: "1"
      leechers:
        text: "0"
  modes:
    search: [q]
    tv-search: [q, season, ep]
category_mappings:
  - indexer_cat: "Anime"
    torznab_cat: 5080
