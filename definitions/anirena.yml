key: aniRena
name: AniRena
rate_limit: 2s
description: AniRena is a Public torrent tracker for the latest anime and Japanese related torrents
type: "public"
enabled: "false"
language: en-US
schedule: '@every 1h'
health_check:
  query: "frieren"
settings:
  - name: use_flaresolverr
    type: checkbox
    label: Use FlareSolverr
    default: 'false'
search:
  type: html
  urls:
    - "https://www.anirena.com/?q={{.Query}}"
  params: {}
  results:
    # AniRena was rewritten — old `torrents_small_*` classes are gone. New
    # layout: single table.tl-table; meta (date/size/seeders/leechers) lives
    # inside td.col-name via spans, not separate columns.
    rows_selector: "table.tl-table tr[data-torrent-id]"
    fields:
      title:
        selector: "a.tl-torrent-name"
      details_url:
        selector: "a.tl-torrent-name@href"
      download_url:
        selector: 'a[title="Download Torrent"]@href'
      size:
        selector: ".tl-meta-size"
      seeders:
        selector: ".tl-se"
      leechers:
        selector: ".tl-le"
      publish_date:
        selector: ".tl-meta-date span[data-utc]"
  modes:
    search: [q]
    tv-search: [q, season, ep]
    music-search: [q]
    book-search: [q]
category_mappings:
  - indexer_cat: '1'
    torznab_cat: 5080
  - indexer_cat: '2'
    torznab_cat: 5080
  - indexer_cat: '3'
    torznab_cat: 5080
  - indexer_cat: '4'
    torznab_cat: 5080
  - indexer_cat: '9'
    torznab_cat: 5080
  - indexer_cat: '10'
    torznab_cat: 5080
  - indexer_cat: '5'
    torznab_cat: 4020
  - indexer_cat: '6'
    torznab_cat: 4000
  - indexer_cat: '7'
    torznab_cat: 7000
  - indexer_cat: '8'
    torznab_cat: 3000
  - indexer_cat: '11'
    torznab_cat: 8000
